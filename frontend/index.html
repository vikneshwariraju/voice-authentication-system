<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"> 
  <title>Voice Authentication</title>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <style>
body {
  margin: 0;
  padding: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #6a11cb, #2575fc);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  color: #fff;
}

.auth-box {
  background-color: rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(10px);
  padding: 40px;
  border-radius: 20px;
  box-shadow: 0 0 20px rgba(0, 0, 0, 0.2);
  text-align: center;
  width: 350px;
  max-width: 90%;
}

h1 {
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: none;
  margin-bottom: 15px;
  outline: none;
}

button {
  background-color: #4CAF50;
  color: white;
  padding: 12px;
  font-size: 15px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  margin: 8px 0;
  width: 100%;
  transition: 0.3s;
}

button:hover {
  background-color: #45a049;
  transform: translateY(-2px);
}

#result {
  margin-top: 20px;
  font-weight: bold;
  min-height: 20px;
}

canvas {
  margin-top: 15px;
  width: 100%;
  height: 60px;
  background-color: rgba(255, 255, 255, 0.2);
  border-radius: 10px;
}
.bar-container {
  width: 100%;
  height: 16px;
  background: rgba(255,255,255,0.2);
  border-radius: 20px;
  overflow: hidden;
  margin-top: 15px;
}

#confidenceBar {
  height: 100%;
  width: 0%;
  transition: width 1.2s ease-in-out;
  border-radius: 20px;
}

#confidenceText {
  margin-top: 10px;
  font-weight: bold;
}
</style>
</head>
<body>
<div class="auth-box">
<h1>🎤Voice Authentication</h1>
<input type="text" id="username" placeholder="Enter username"/>
<button onclick="startRecording('register')">🎤 Register Voice</button>
<button onclick="startRecording('login')">🔐 Login with Voice</button>
<button onclick="stopRecording()">⏹ Stop & Send</button>
<canvas id="visualizer"></canvas>

  <p id="result">Result: Loading ..</p>
  <div class="voice-card">
  <div class="bar-container">
    <div id="confidenceBar"></div>
  </div>
  <p id="confidenceText">Confidence Bar</p>
</div>
</div>

<script>
let audioContext, stream, source, processor;
let audioData = [];
let mode = "login";

function startRecording(type) {
  mode=type;
    navigator.mediaDevices.getUserMedia({ audio: true }).then(s => {
    stream = s;
    audioContext = new (window.AudioContext || window.webkitAudioContext)();

    source = audioContext.createMediaStreamSource(stream);
    processor = audioContext.createScriptProcessor(4096, 1, 1);

    source.connect(processor);
    processor.connect(audioContext.destination);

    audioData = [];

    processor.onaudioprocess = function(e) {
      const data = e.inputBuffer.getChannelData(0);
      audioData.push(new Float32Array(data));
    };

    document.getElementById("result").innerText = "🎙️ Recording...";
  });
}

async function stopRecording() {
  processor.disconnect();
  source.disconnect();
  stream.getTracks().forEach(track => track.stop());

  const blob = encodeWAV(audioData);
  const formData = new FormData();
  formData.append("file", blob, "voice.wav");

  const username = document.getElementById("username").value;

  let url = mode === "register"
    ? "https://voice-authentication-system.onrender.com/register/?user=${username}"
    : "https://voice-authentication-system.onrender.com/login/";

  try {
    const res = await fetch(url, {
      method: "POST",
      body: formData
    });

    const data = await res.json();
    console.log("RESPONSE:", data);

    // ✅ REGISTER
    if (mode === "register") {
      document.getElementById("result").innerText =
        "✅ Registered successfully!";
    }

    // ✅ LOGIN
    else if (mode === "login") {
      if (data.status === "AUTHENTICATED") {
        // store user
        localStorage.setItem("user", data.user);
        // CONFETTI
        launchConfetti();

        // CONFIDENCE BAR
        updateConfidence(data.confidence);
        document.getElementById("result").innerText =`✅ Welcome ${data.user}! Redirecting...`;

        // redirect after 1 sec
        setTimeout(() => { window.location.href = "./dashboard.html";}, 3000);
        }else {
        document.getElementById("result").innerText =
          `❌ Access Denied\nConfidence: ${data.confidence}%`;
        }
        }
        } catch (err) {
        console.error(err);
        document.getElementById("result").innerText = "❌ Server Error";
  }
}
function launchConfetti() {
            const end = Date.now() + 2000;
            (function frame() {
                confetti({ particleCount: 7, spread: 70, origin: { y: 0.6 }, zIndex: 9999 });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }


function encodeWAV(samples) {
  let buffer = flatten(samples);
  let dataview = createWavFile(buffer);
  return new Blob([dataview], { type: 'audio/wav' });
}

function flatten(arrays) {
  let result = new Float32Array(arrays.reduce((a, b) => a + b.length, 0));
  let offset = 0;
  for (let arr of arrays) {
    result.set(arr, offset);
    offset += arr.length;
  }
  return result;
}

function createWavFile(samples) {
  let buffer = new ArrayBuffer(44 + samples.length * 2);
  let view = new DataView(buffer);

  writeString(view, 0, 'RIFF');
  view.setUint32(4, 36 + samples.length * 2, true);
  writeString(view, 8, 'WAVE');
  writeString(view, 12, 'fmt ');
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true);
  view.setUint16(22, 1, true);
  view.setUint32(24, 44100, true);
  view.setUint32(28, 44100 * 2, true);
  view.setUint16(32, 2, true);
  view.setUint16(34, 16, true);
  writeString(view, 36, 'data');
  view.setUint32(40, samples.length * 2, true);

  floatTo16BitPCM(view, 44, samples);

  return view;
}

function floatTo16BitPCM(output, offset, input) {
  for (let i = 0; i < input.length; i++, offset += 2) {
    let s = Math.max(-1, Math.min(1, input[i]));
    output.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
  }
}

function writeString(view, offset, string) {
  for (let i = 0; i < string.length; i++) {
    view.setUint8(offset + i, string.charCodeAt(i));
  }
}
function updateConfidence(confidence) {
  const bar = document.getElementById("confidenceBar");
  const text = document.getElementById("confidenceText");

  setTimeout(() => {
    bar.style.width = confidence + "%";
  }, 200);

  text.innerText = `Match Score: ${confidence}%`;

  if (confidence >= 80) {
    bar.style.background = "linear-gradient(90deg, #00ff99, #00cc66)";
    text.style.color = "#00ff99";
  } else if (confidence >= 60) {
    bar.style.background = "linear-gradient(90deg, #ffcc00, #ff9900)";
    text.style.color = "#ffcc00";
  } else {
    bar.style.background = "linear-gradient(90deg, #ff4d4d, #cc0000)";
    text.style.color = "#ff4d4d";
  }
}

</script>

</body>
</html>
